[Metadata]
Name=MinimalTopBarFR
Author=Brian Hanquet
Information=Barre moderne minimaliste style GNOME, date FR via Lua.
Version=6.0

[Rainmeter]
Update=30000
AccurateText=1
AlwaysOnTop=2
KeepOnScreen=0
ClickThrough=1
SnapEdges=0
DefaultWindowX=0
DefaultWindowY=0
OnRefreshAction=[!ZPos 2][!Move 0 0]

; ==================================================
; APPBAR - Reserve l'espace en haut de l'ecran
; ==================================================
[AppBar]
Measure=Plugin
Plugin=AppBar
RequiredSpace=#BarHeight#
Edge=Top

; ==================================================
; VARIABLES
; ==================================================
[Variables]
BarWidth=#SCREENAREAWIDTH#
BarHeight=36
BgColor=28,28,32,245
AccentColor=53,132,228,255
TextPrimary=250,250,252,255
TextSecondary=155,155,165,255
IconFont=Segoe MDL2 Assets
TextFont=Segoe UI
TimeSize=12
DateSize=12
DateFR=

; ==================================================
; BACKGROUND
; ==================================================
[Background]
Meter=Shape
Shape=Rectangle 0,0,#BarWidth#,#BarHeight#,0 | Fill Color #BgColor#
Shape2=Rectangle 0,(#BarHeight#-2),#BarWidth#,2,0 | Fill Color #AccentColor#
W=#BarWidth#
H=#BarHeight#

; ==================================================
; MEASURES - Time & Date
; ==================================================
[MeasureTime]
Measure=Time
Format=%H:%M

[MeasureRawDay]
Measure=Time
Format=%A

[MeasureRawDate]
Measure=Time
Format=%d

[MeasureRawMonth]
Measure=Time
Format=%B

[MeasureRawYear]
Measure=Time
Format=%Y

[MeasureLua]
Measure=Script
ScriptFile=fr.lua
UpdateDivider=1

[MeasureDateFR]
Measure=String
DynamicVariables=1
String=#DateFR#

; ==================================================
; LEFT SECTION - Clock & Time
; ==================================================
[ClockCircle]
Meter=Shape
Shape=Ellipse 10,10,7 | StrokeWidth 2 | Stroke Color #AccentColor# | FillColor 0,0,0,0
Shape2=Line 10,10,10,5 | StrokeWidth 2 | Stroke Color #AccentColor#
Shape3=Line 10,10,15,10 | StrokeWidth 2 | Stroke Color #AccentColor#
X=20
Y=9

[TimeText]
Meter=String
MeasureName=MeasureTime
X=48
Y=(#BarHeight#/2)
FontFace=#TextFont#
FontColor=#TextPrimary#
FontSize=#TimeSize#
FontWeight=600
StringAlign=LeftCenter
AntiAlias=1
DynamicVariables=1

; ==================================================
; CENTER SECTION - Date
; ==================================================
[DateText]
Meter=String
MeasureName=MeasureDateFR
X=(#BarWidth#/2)
Y=(#BarHeight#/2)
FontFace=#TextFont#
FontColor=#TextPrimary#
FontSize=#DateSize#
StringAlign=CenterCenter
AntiAlias=1
FontWeight=500
DynamicVariables=1

; ==================================================
; RIGHT SECTION - Power Button
; ==================================================
[PowerIcon]
Meter=String
Text="[\xE7E8]"
X=(#BarWidth# - 20)
Y=(#BarHeight#/2)
FontFace=#IconFont#
FontSize=14
FontColor=#TextPrimary#
StringAlign=RightCenter
AntiAlias=1
SolidColor=0,0,0,1
Padding=10,8,10,8
LeftMouseUpAction=[!ToggleMeterGroup PowerMenu][!Redraw]
MouseOverAction=[!SetOption PowerIcon FontColor "255,100,100"][!UpdateMeter PowerIcon][!Redraw]
MouseLeaveAction=[!SetOption PowerIcon FontColor #TextPrimary#][!UpdateMeter PowerIcon][!Redraw]

; ==================================================
; POWER MENU POPUP
; ==================================================
[PowerMenuBG]
Meter=Shape
X=(#BarWidth# - 170)
Y=(#BarHeight# + 5)
Shape=Rectangle 0,0,160,220,8 | Fill Color 35,35,35,255 | StrokeWidth 1 | StrokeColor 80,80,80
Group=PowerMenu
Hidden=1
DynamicVariables=1

[MenuLock]
Meter=String
Text="[\xE72E]  Verrouiller"
X=15r
Y=15r
FontFace=#TextFont#
InlineSetting=Face | #IconFont#
InlinePattern=[\xE72E]
FontSize=11
FontColor=255,255,255
AntiAlias=1
SolidColor=0,0,0,1
Padding=5,8,40,8
LeftMouseUpAction=[rundll32.exe user32.dll,LockWorkStation][!HideMeterGroup PowerMenu][!Redraw]
MouseOverAction=[!SetOption MenuLock FontColor "200,200,200"][!UpdateMeter MenuLock][!Redraw]
MouseLeaveAction=[!SetOption MenuLock FontColor "255,255,255"][!UpdateMeter MenuLock][!Redraw]
Group=PowerMenu
Hidden=1

[MenuSleep]
Meter=String
Text="[\xE708]  Veille"
X=0r
Y=40r
FontFace=#TextFont#
InlineSetting=Face | #IconFont#
InlinePattern=[\xE708]
FontSize=11
FontColor=255,255,255
AntiAlias=1
SolidColor=0,0,0,1
Padding=5,8,60,8
LeftMouseUpAction=[rundll32.exe powrprof.dll,SetSuspendState 0,1,0][!HideMeterGroup PowerMenu][!Redraw]
MouseOverAction=[!SetOption MenuSleep FontColor "100,200,255"][!UpdateMeter MenuSleep][!Redraw]
MouseLeaveAction=[!SetOption MenuSleep FontColor "255,255,255"][!UpdateMeter MenuSleep][!Redraw]
Group=PowerMenu
Hidden=1

[MenuRestart]
Meter=String
Text="[\xE72C]  Redemarrer"
X=0r
Y=40r
FontFace=#TextFont#
InlineSetting=Face | #IconFont#
InlinePattern=[\xE72C]
FontSize=11
FontColor=255,255,255
AntiAlias=1
SolidColor=0,0,0,1
Padding=5,8,45,8
LeftMouseUpAction=[shutdown /r /t 0]
MouseOverAction=[!SetOption MenuRestart FontColor "100,200,255"][!UpdateMeter MenuRestart][!Redraw]
MouseLeaveAction=[!SetOption MenuRestart FontColor "255,255,255"][!UpdateMeter MenuRestart][!Redraw]
Group=PowerMenu
Hidden=1

[MenuShutdown]
Meter=String
Text="[\xE7E8]  Eteindre"
X=0r
Y=40r
FontFace=#TextFont#
InlineSetting=Face | #IconFont#
InlinePattern=[\xE7E8]
FontSize=11
FontColor=255,100,100
AntiAlias=1
SolidColor=0,0,0,1
Padding=5,8,60,8
LeftMouseUpAction=[shutdown /s /t 0]
MouseOverAction=[!SetOption MenuShutdown FontColor "255,50,50"][!UpdateMeter MenuShutdown][!Redraw]
MouseLeaveAction=[!SetOption MenuShutdown FontColor "255,100,100"][!UpdateMeter MenuShutdown][!Redraw]
Group=PowerMenu
Hidden=1
